name: Deploy ERP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      JWT_SECRET: build-time-dummy-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Generate Prisma client
        working-directory: app
        run: npx prisma generate

      - name: Build
        working-directory: app
        run: npm run build

      - name: Verify build
        run: |
          test -f app/.next/BUILD_ID
          test -f app/.next/standalone/server.js

      - name: Package release
        run: |
          cd app
          tar -czf /tmp/release.tar.gz \
            .next \
            public \
            prisma \
            package.json \
            node_modules \
            src/generated/prisma

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          scp -i ~/.ssh/deploy_key \
            /tmp/release.tar.gz \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/release.tar.gz

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "/var/www/gorchev-v/deploy-release.sh /tmp/release.tar.gz && rm -f /tmp/release.tar.gz"
