services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gorchev}
      POSTGRES_USER: ${POSTGRES_USER:-gorchev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gorchev}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gorchev}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gorchev}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@gorchev.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
