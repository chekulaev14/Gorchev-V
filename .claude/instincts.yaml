# Функции с генерацией ID вызывать один раз

## Action
Если функция генерирует уникальные ID (genId, uuid и т.п.), результат сохранять в переменную и переиспользовать. Не вызывать повторно — каждый вызов даёт другой ID.

## Evidence
- makeProject() вызывался 3 раза в onClick: rawSetProject(makeProject()), histRef = makeProject(), setActiveChainId(makeProject().chains[0].chainId). Каждый вызов генерировал новый chainId, activeChainId указывал на несуществующую цепочку (2026-03-16)

