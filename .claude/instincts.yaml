## Action
Не размещать напоминания для Claude на Stop хуке — output уходит в пустоту после завершения ответа. Для напоминаний использовать PreCompact (при сжатии контекста) или UserPromptSubmit (перед каждым сообщением). Либо правила в CLAUDE.md.

## Evidence
