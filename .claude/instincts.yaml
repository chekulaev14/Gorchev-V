# CSS классы на одном элементе — не дочерние

## Action
Если React компонент собирает className из массива ('pipeline-node chain-node blank connect-source'), CSS селектор должен быть `.pipeline-node.connect-source` (оба на одном элементе), а НЕ `.pipeline-node.connect-source .chain-node` (дочерний). Особенно актуально для htm+React где нет JSX и className формируется конкатенацией.

## Evidence
- connect-source подсветка не работала: `.pipeline-node.connect-source .chain-node` искал дочерний, а все классы были на одном div (2026-03-18)
