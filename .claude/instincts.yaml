# Evaluate вместо dialog handler в MCP Playwright

## Action
Вместо page.on('dialog') или browser_handle_dialog использовать page.evaluate(() => { window.confirm = () => true }) перед действием. MCP Playwright proxy конфликтует с page.on('dialog').

## Evidence
- page.on('dialog') внутри run_code вызывал race condition с MCP proxy (2026-03-16)
- browser_handle_dialog возвращал "already handled" (2026-03-16)
- Workaround через evaluate стабильно работает

