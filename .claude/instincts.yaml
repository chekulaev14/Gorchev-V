# useMemo вместо useEffect для layout графа

## Action
Для вычисления layout (dagre, grid, tree) использовать useMemo от данных, а не useEffect + setState. useEffect с setState вызывает асинхронность, race condition между несколькими effects, и лишние рендеры. useMemo вычисляет layout синхронно при рендере — детерминированно и без побочных эффектов.

## Evidence
- Два useEffect (структурный + data-only) в конструкторе цепочки создавали race condition: data-only effect перетирал edges до того как структурный effect успевал их установить (2026-03-18)
- Фронтенд-агент подтвердил: React Flow handles registration race condition — edges приходят раньше чем узлы монтируются (2026-03-18)

